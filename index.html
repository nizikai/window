<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Parallax Flip Window</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <div class="component-container">
    <div class="perspective-wrapper">
      <div class="card">
      <div class="card-inner">

      <!-- HUD overlay -->
      <div class="scan-line"></div>
      <div class="frame-corner frame-corner--tl"></div>
      <div class="frame-corner frame-corner--tr"></div>
      <div class="frame-corner frame-corner--bl"></div>
      <div class="frame-corner frame-corner--br"></div>

      <!-- FRONT FACE — Cosmic depth scene -->
      <div class="card-face front-face">
        <div class="depth-scene" id="frontScene">

          <div class="depth-layer" data-depth="0.1">
            <div class="bg-space bg-space--front">
              <div class="star star--1"></div>
              <div class="star star--2"></div>
              <div class="star star--3"></div>
              <div class="star star--4"></div>
              <div class="star star--5"></div>
              <div class="star star--6"></div>
              <div class="star star--7"></div>
              <div class="star star--8"></div>
              <div class="star star--9"></div>
              <div class="star star--10"></div>
              <div class="nebula nebula--1"></div>
              <div class="nebula nebula--2"></div>
            </div>
          </div>

          <div class="depth-layer" data-depth="0.5">
            <div class="ring ring--outer ring--cyan"></div>
            <div class="ring ring--mid ring--purple"></div>
            <div class="grid-plane grid-plane--front"></div>
          </div>

          <div class="depth-layer" data-depth="1.0">
            <div class="hex hex--1"></div>
            <div class="hex hex--2"></div>
            <div class="crosshair"></div>
          </div>

          <div class="depth-layer" data-depth="2.0">
            <div class="geo geo--1"></div>
            <div class="geo geo--2"></div>
            <div class="geo geo--3"></div>
            <div class="geo geo--4"></div>
            <div class="geo geo--5"></div>
            <div class="geo geo--6"></div>
            <div class="line-accent line-accent--1"></div>
            <div class="line-accent line-accent--2"></div>
            <div class="line-accent line-accent--3"></div>
            <div class="line-accent line-accent--4"></div>
          </div>

          <div class="depth-layer" data-depth="3.5">
            <div class="orb orb--1"></div>
            <div class="orb orb--2"></div>
            <div class="orb orb--3"></div>
            <div class="orb orb--4"></div>
            <div class="orb orb--5"></div>
            <div class="orb orb--6"></div>
            <div class="orb orb--7"></div>
            <div class="orb orb--8"></div>
          </div>

        </div>
      </div>

      <!-- BACK FACE — Different depth scene (warm/purple theme) -->
      <div class="card-face back-face">
        <div class="depth-scene" id="backScene">

          <div class="depth-layer" data-depth="0.1">
            <div class="bg-space bg-space--back">
              <div class="star star--1"></div>
              <div class="star star--2"></div>
              <div class="star star--3"></div>
              <div class="star star--4"></div>
              <div class="star star--5"></div>
              <div class="star star--6"></div>
              <div class="star star--7"></div>
              <div class="star star--8"></div>
              <div class="nebula nebula--3"></div>
              <div class="nebula nebula--4"></div>
            </div>
          </div>

          <div class="depth-layer" data-depth="0.5">
            <div class="ring ring--outer ring--purple"></div>
            <div class="ring ring--mid ring--cyan"></div>
            <div class="grid-plane grid-plane--back"></div>
          </div>

          <div class="depth-layer" data-depth="1.0">
            <div class="diamond diamond--1"></div>
            <div class="diamond diamond--2"></div>
            <div class="diamond diamond--3"></div>
            <div class="crosshair crosshair--purple"></div>
          </div>

          <div class="depth-layer" data-depth="2.0">
            <div class="geo geo--b1"></div>
            <div class="geo geo--b2"></div>
            <div class="geo geo--b3"></div>
            <div class="geo geo--b4"></div>
            <div class="line-accent line-accent--b1"></div>
            <div class="line-accent line-accent--b2"></div>
            <div class="line-accent line-accent--b3"></div>
            <div class="line-accent line-accent--b4"></div>
          </div>

          <div class="depth-layer" data-depth="3.5">
            <div class="orb orb--b1"></div>
            <div class="orb orb--b2"></div>
            <div class="orb orb--b3"></div>
            <div class="orb orb--b4"></div>
            <div class="orb orb--b5"></div>
            <div class="orb orb--b6"></div>
            <div class="orb orb--b7"></div>
            <div class="orb orb--b8"></div>
          </div>

        </div>
      </div>

      </div>
      </div>
    </div>
  </div>

  <div class="scroll-indicator">
    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
      <path d="M12 5v14"/><path d="M19 12l-7 7-7-7"/>
    </svg>
  </div>

  <div class="spacer spacer--rest"></div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/ScrollTrigger.min.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
