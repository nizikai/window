<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Parallax Flip Window</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <div class="component-container">
    <div class="perspective-wrapper">
      <div class="stage">

        <!-- STATIC scene wrapper. Canvas keeps full size. clip-path narrows on scroll. -->
        <div class="scene-clip">
          <canvas id="canvas"></canvas>
        </div>

        <!-- TILTING + FLIPPING card frame on top -->
        <div class="card">
          <div class="card-inner">

            <!-- HUD overlay (lives on the card, tilts/flips with it) -->
            <div class="scan-line"></div>
            <div class="frame-corner frame-corner--tl"></div>
            <div class="frame-corner frame-corner--tr"></div>
            <div class="frame-corner frame-corner--bl"></div>
            <div class="frame-corner frame-corner--br"></div>

            <div class="card-face front-face"></div>
            <div class="card-face back-face"></div>

          </div>
        </div>

      </div>
    </div>
  </div>

  <div class="scroll-indicator">
    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
      <path d="M12 5v14"/><path d="M19 12l-7 7-7-7"/>
    </svg>
  </div>

  <div class="spacer spacer--rest"></div>

  <script src="https://unpkg.com/three@0.160.0/build/three.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/ScrollTrigger.min.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
