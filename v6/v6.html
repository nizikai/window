<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Window v6
    
  </title>
  <link rel="icon" href="data:,">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="scroll-stage">
  <div class="pin-section">

    <!-- z1: Fullscreen Three.js scene. JS clips it to the rotating cutout's projected bbox so
         the scene is only painted inside the window, while the canvas itself never rotates. -->
    <canvas id="canvas" class="scene-canvas"></canvas>

    <!-- z1: static white guard — white backdrop below canvas -->
    <div class="wall-gap-guard" aria-hidden="true"></div>

    <!-- z3: white cover — non-rotating, inverse clip-path punches scene polygon as a hole;
         reliably covers any dark canvas bleed that CSS clip-path misses on GPU layers -->
    <div class="white-cover" aria-hidden="true"></div>

    <!-- z3: Fullscreen white wall with card-shaped hole. Rotates on scroll. -->
    <div class="wall">
      <div class="wall-face wall-front">
        <div class="wall-cutout"></div>
      </div>

      <div class="wall-face wall-back">
        <div class="wall-cutout"></div>
      </div>

      <div class="wall-tunnel" aria-hidden="true">
        <div class="tunnel-face tunnel-top"></div>
        <div class="tunnel-face tunnel-right"></div>
        <div class="tunnel-face tunnel-bottom"></div>
        <div class="tunnel-face tunnel-left"></div>
      </div>
    </div>

    <div class="scroll-indicator">
      <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
        <path d="M12 5v14"/><path d="M19 12l-7 7-7-7"/>
      </svg>
    </div>

    <!-- FPS Counter -->
    <div class="fps-counter">
      <div class="fps-value">60</div>
      <div class="fps-label">FPS</div>
    </div>

    <!-- Gyro enable button — shown by JS only on iOS 13+ -->
    <button class="gyro-btn" id="gyro-btn" aria-label="Enable gyroscope tilt">
      <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
        <path d="M12 2a10 10 0 1 0 10 10"/>
        <path d="M12 6v6l4 2"/>
        <path d="M22 2l-3 3 3 3"/>
      </svg>
      <span>Gyro</span>
    </button>
  </div>
  </div>

  <section class="after-spacer">
    <p>Scroll back up to reverse</p>
  </section>

  <script src="app.js"></script>
  <script type="module" src="scene.js"></script>
</body>
</html>
